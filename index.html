    <link rel="preconnect" href="https://fonts.googleapis.com" />

    <title>一个数字游民的博客 | Yanbo's Blog</title>
    <style>
      .goog-te-banner-frame { display: none !important; }
      .goog-te-menu-frame { max-width: 100% !important; }
      body { top: 0 !important; }
      .skiptranslate { display: none !important; }
      .goog-te-spinner-pos { display: none !important; }
      #google_translate_element { display: none !important; }
    </style>
  </head>
  <body class="bg-cream dark:bg-gray-950 text-gray-800 dark:text-gray-200 font-body">
    <div id="google_translate_element"></div>
    <div id="root"></div>
    <script type="text/javascript">
      window.__gtInit = function() {
        new google.translate.TranslateElement({
          pageLanguage: 'zh-CN',
          autoDisplay: false,
          multilanguagePage: true
        }, 'google_translate_element');
      };
      window.__loadGoogleTranslate = function() {
        return new Promise(function(resolve) {
          if (document.querySelector('script[data-gt-loaded]')) {
            resolve();
            return;
          }
          var s = document.createElement('script');
          s.src = '//translate.google.com/translate_a/element.js?cb=__gtInit';
          s.setAttribute('data-gt-loaded', '1');
          s.onload = resolve;
          s.onerror = resolve;
          document.body.appendChild(s);
        });
      };
      window.__setTranslateLang = function(code) {
        var eq = window.location.pathname + window.location.search;
        if (code === 'zh-CN') {
          document.cookie = 'googtrans=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/;';
          document.cookie = 'googtrans=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/; domain=' + window.location.hostname;
          window.history.replaceState(null, '', eq);
          window.location.reload();
          return;
        }
        window.location.hash = 'googtrans(zh-CN|' + code + ')';
        window.location.reload();
      };
      (function() {
        var h = window.location.hash;
        if (h && h.indexOf('googtrans') !== -1) {
          window.__loadGoogleTranslate();
        }
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
